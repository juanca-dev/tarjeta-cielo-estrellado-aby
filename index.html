
<style>
  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-8px); }
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes petal {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 0; }
    10% { opacity: 0.8; }
    90% { opacity: 0.4; }
    100% { transform: translateY(700px) rotate(360deg); opacity: 0; }
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
  }
  @keyframes twinkle {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.15; }
  }
  @keyframes moonGlow {
    0%, 100% { filter: drop-shadow(0 0 8px rgba(255,230,150,0.5)); }
    50% { filter: drop-shadow(0 0 20px rgba(255,230,150,0.95)); }
  }
  @keyframes shimmer {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(24px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes glowBorder {
    0%, 100% { box-shadow: 0 0 8px rgba(180,140,255,0.4), inset 0 0 8px rgba(180,140,255,0.1); }
    50% { box-shadow: 0 0 18px rgba(180,140,255,0.7), inset 0 0 14px rgba(180,140,255,0.2); }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  .wrap {
    position: relative;
    width: 100%;
    min-height: 700px;
    border-radius: 16px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: clamp(1rem, 4vw, 2rem) clamp(0.75rem, 3vw, 1.5rem);
  }

  .sky-bg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
  }

  .petal {
    position: absolute;
    top: -20px;
    animation: petal linear infinite;
    pointer-events: none;
    user-select: none;
    z-index: 1;
    color: rgba(200,170,255,0.7);
    font-size: clamp(11px, 2vw, 16px);
  }

  .card {
    position: relative;
    z-index: 2;
    background: rgba(10, 8, 30, 0.58);
    border: 0.5px solid rgba(180,160,255,0.3);
    border-radius: 18px;
    padding: clamp(1.5rem, 4vw, 2rem) clamp(1.2rem, 4vw, 1.8rem);
    width: 100%;
    max-width: 380px;
    text-align: center;
    animation: cardIn 1.2s ease both;
    backdrop-filter: blur(12px);
  }

  /* Photo area */
  .photo-area {
    position: relative;
    width: 160px;
    height: 160px;
    margin: 0 auto 1.2rem;
    border-radius: 50%;
    border: 2px solid rgba(180,140,255,0.5);
    animation: glowBorder 3s ease-in-out infinite;
    overflow: hidden;
    cursor: pointer;
    background: rgba(30,20,60,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 6px;
  }

  .photo-area img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
    border-radius: 50%;
  }

  .photo-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    pointer-events: none;
  }

  .photo-placeholder span {
    font-size: 28px;
    opacity: 0.6;
  }

  .photo-placeholder p {
    font-size: 11px;
    color: rgba(200,170,255,0.7);
    line-height: 1.4;
  }

  input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .heart-icon {
    font-size: clamp(28px, 6vw, 36px);
    animation: pulse 2.2s ease-in-out infinite, float 3s ease-in-out infinite;
    display: block;
    margin-bottom: 0.5rem;
    line-height: 1;
  }

  .card-title {
    font-size: clamp(18px, 4vw, 22px);
    font-weight: 500;
    color: #e8d5ff;
    margin-bottom: 0.4rem;
  }

  .divider {
    width: 44px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #9b7fd4, transparent);
    margin: 0.6rem auto;
  }

  .card-msg {
    font-size: clamp(13px, 2.8vw, 14px);
    color: #c8b8e8;
    line-height: 1.85;
    margin-bottom: 1.1rem;
  }

  .card-msg em {
    color: #e8d5ff;
    font-style: normal;
    font-weight: 500;
  }

  .stars-row {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 1rem;
    animation: shimmer 2.5s ease-in-out infinite;
  }

  .star { font-size: 13px; color: #c9a0ff; }

  .footer-note {
    font-size: clamp(11px, 2.2vw, 12px);
    color: #9b7fd4;
    letter-spacing: 0.05em;
  }

  .send-btn {
    margin-top: 1rem;
    background: transparent;
    border: 0.5px solid rgba(180,160,255,0.4);
    color: #c9a0ff;
    font-size: clamp(12px, 2.5vw, 13px);
    padding: 8px 20px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.2s;
    width: 100%;
  }
  .send-btn:hover { background: rgba(155,127,212,0.18); }
</style>

<div class="wrap">
  <svg class="sky-bg" viewBox="0 0 700 700" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="skyG2" cx="50%" cy="0%" r="100%">
        <stop offset="0%" stop-color="#0d0b2e"/>
        <stop offset="45%" stop-color="#0a0820"/>
        <stop offset="100%" stop-color="#060418"/>
      </radialGradient>
      <radialGradient id="moonG2" cx="38%" cy="32%" r="60%">
        <stop offset="0%" stop-color="#fff9d6"/>
        <stop offset="60%" stop-color="#ffe97a"/>
        <stop offset="100%" stop-color="#f0c840"/>
      </radialGradient>
      <radialGradient id="glowG2" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#ffe97a" stop-opacity="0.28"/>
        <stop offset="100%" stop-color="#ffe97a" stop-opacity="0"/>
      </radialGradient>
    </defs>
    <rect width="700" height="700" fill="url(#skyG2)"/>
    <ellipse cx="580" cy="88" rx="72" ry="72" fill="url(#glowG2)" style="animation: moonGlow 4s ease-in-out infinite;"/>
    <g style="animation: moonGlow 4s ease-in-out infinite;">
      <circle cx="580" cy="88" r="38" fill="url(#moonG2)"/>
      <circle cx="599" cy="72" r="38" fill="#0d0b2e"/>
    </g>
    <circle cx="42" cy="28" r="1.6" fill="white" style="animation: twinkle 2.1s ease-in-out infinite 0s;"/>
    <circle cx="118" cy="16" r="1.2" fill="white" style="animation: twinkle 3s ease-in-out infinite 0.5s;"/>
    <circle cx="198" cy="44" r="1.8" fill="white" style="animation: twinkle 2.5s ease-in-out infinite 1s;"/>
    <circle cx="308" cy="13" r="1.3" fill="white" style="animation: twinkle 1.8s ease-in-out infinite 0.3s;"/>
    <circle cx="388" cy="34" r="1.1" fill="#e0d0ff" style="animation: twinkle 2.8s ease-in-out infinite 0.8s;"/>
    <circle cx="458" cy="19" r="1.5" fill="white" style="animation: twinkle 3.2s ease-in-out infinite 0.2s;"/>
    <circle cx="638" cy="38" r="1.4" fill="white" style="animation: twinkle 1.9s ease-in-out infinite 0.6s;"/>
    <circle cx="68" cy="78" r="1.2" fill="#ffe0ff" style="animation: twinkle 3.4s ease-in-out infinite 0.4s;"/>
    <circle cx="258" cy="58" r="1.6" fill="white" style="animation: twinkle 2.7s ease-in-out infinite 0.7s;"/>
    <circle cx="428" cy="66" r="1.4" fill="white" style="animation: twinkle 1.7s ease-in-out infinite 0.3s;"/>
    <circle cx="98" cy="122" r="1.3" fill="#d0e8ff" style="animation: twinkle 2.4s ease-in-out infinite 1.3s;"/>
    <circle cx="218" cy="108" r="1.1" fill="white" style="animation: twinkle 3.3s ease-in-out infinite 0.8s;"/>
    <circle cx="478" cy="108" r="1.5" fill="white" style="animation: twinkle 2s ease-in-out infinite 0.2s;"/>
    <circle cx="658" cy="108" r="1.2" fill="#ffe0ff" style="animation: twinkle 2.8s ease-in-out infinite 1s;"/>
    <circle cx="290" cy="130" r="1.3" fill="#e8d0ff" style="animation: twinkle 2.2s ease-in-out infinite 1.4s;"/>
    <circle cx="540" cy="140" r="1.4" fill="white" style="animation: twinkle 3.6s ease-in-out infinite 0.7s;"/>
    <line x1="78" y1="48" x2="142" y2="80" stroke="white" stroke-width="0.8" stroke-opacity="0.45" style="animation: twinkle 5s ease-in-out infinite 2.2s;"/>
    <rect x="0" y="560" width="700" height="140" fill="#120820" opacity="0.5"/>
  </svg>

  <span class="petal" style="left:6%; animation-duration:8s; animation-delay:0s;">✦</span>
  <span class="petal" style="left:20%; animation-duration:11s; animation-delay:1.8s;">✧</span>
  <span class="petal" style="left:72%; animation-duration:9s; animation-delay:0.6s;">✦</span>
  <span class="petal" style="left:88%; animation-duration:12s; animation-delay:2.2s;">✧</span>

  <div class="card">
    <!-- Photo circle -->
    <div class="photo-area" id="photoArea">
      <input type="file" accept="image/*" id="fileInput" onchange="loadPhoto(event)"/>
      <div class="photo-placeholder" id="placeholder">
        <span>🌙</span>
        <p>toca para<br>agregar foto</p>
      </div>
      <img id="photoImg" alt="foto"/>
    </div>

    <span class="heart-icon">✨</span>
    <p class="card-title">Para ti</p>
    <div class="divider"></div>
    <p class="card-msg">
      A veces la vida trae personas inesperadas<br>
      que sin darse cuenta, se vuelven parte<br>
      de tus días favoritos.<br><br>
      Gracias por aparecer,<br>
      por tus mensajes, tu compañía,<br>
      y por hacerme <em>sonreír</em> sin proponértelo.
    </p>
    <div class="stars-row">
      <span class="star">✦</span>
      <span class="star">✦</span>
      <span class="star">✦</span>
      <span class="star">✦</span>
      <span class="star">✦</span>
    </div>
    <p class="footer-note">con cariño, desde acá ✉︎</p>
    <button class="send-btn" onclick="sendPrompt('Quiero personalizar el mensaje de la tarjeta')">personalizar mensaje ↗</button>
  </div>
</div>

<script>
function loadPhoto(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = document.getElementById('photoImg');
    const placeholder = document.getElementById('placeholder');
    img.src = e.target.result;
    img.style.display = 'block';
    placeholder.style.display = 'none';
  };
  reader.readAsDataURL(file);
}
</script>
