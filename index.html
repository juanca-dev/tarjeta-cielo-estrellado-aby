
<style>
  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-8px); }
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes petal {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 0; }
    10% { opacity: 0.8; }
    90% { opacity: 0.4; }
    100% { transform: translateY(560px) rotate(360deg); opacity: 0; }
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
  }
  @keyframes twinkle {
    0%, 100% { opacity: 1; r: 1.5px; }
    50% { opacity: 0.2; r: 0.8px; }
  }
  @keyframes twinkle2 {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }
  @keyframes moonGlow {
    0%, 100% { filter: drop-shadow(0 0 8px rgba(255,230,150,0.5)); }
    50% { filter: drop-shadow(0 0 18px rgba(255,230,150,0.9)); }
  }
  @keyframes shimmer {
    0% { opacity: 0.6; }
    50% { opacity: 1; }
    100% { opacity: 0.6; }
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(24px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .wrap {
    position: relative;
    min-height: 540px;
    border-radius: 20px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .sky-bg {
    position: absolute;
    inset: 0;
    z-index: 0;
  }

  .petal {
    position: absolute;
    top: 0;
    font-size: 16px;
    animation: petal linear infinite;
    pointer-events: none;
    user-select: none;
    z-index: 1;
  }

  .card {
    position: relative;
    z-index: 2;
    background: rgba(10, 8, 30, 0.55);
    border: 0.5px solid rgba(180,160,255,0.3);
    border-radius: 20px;
    padding: 2.5rem 2rem;
    max-width: 340px;
    width: 100%;
    text-align: center;
    animation: cardIn 1.2s ease both;
    backdrop-filter: blur(10px);
  }

  .heart-icon {
    font-size: 44px;
    animation: pulse 2.2s ease-in-out infinite, float 3s ease-in-out infinite;
    display: block;
    margin-bottom: 0.8rem;
    line-height: 1;
  }

  .card-title {
    font-size: 22px;
    font-weight: 500;
    color: #e8d5ff;
    margin: 0 0 0.4rem;
  }

  .divider {
    width: 48px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #9b7fd4, transparent);
    margin: 0.75rem auto;
  }

  .card-msg {
    font-size: 14.5px;
    color: #c8b8e8;
    line-height: 1.85;
    margin: 0 0 1.4rem;
  }

  .card-msg em {
    color: #e8d5ff;
    font-style: normal;
    font-weight: 500;
  }

  .stars-row {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 1.2rem;
    animation: shimmer 2.5s ease-in-out infinite;
  }

  .star { font-size: 13px; color: #c9a0ff; }

  .footer-note {
    font-size: 12px;
    color: #9b7fd4;
    letter-spacing: 0.05em;
  }

  .send-btn {
    margin-top: 1.2rem;
    background: transparent;
    border: 0.5px solid rgba(180,160,255,0.4);
    color: #c9a0ff;
    font-size: 13px;
    padding: 8px 20px;
    border-radius: var(--border-radius-md);
    cursor: pointer;
    transition: background 0.2s;
    display: block;
    width: 100%;
  }
  .send-btn:hover { background: rgba(155,127,212,0.15); }
</style>

<div class="wrap">

  <svg class="sky-bg" viewBox="0 0 700 560" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="skyGrad" cx="50%" cy="0%" r="100%">
        <stop offset="0%" stop-color="#0d0b2e"/>
        <stop offset="40%" stop-color="#0a0820"/>
        <stop offset="100%" stop-color="#060418"/>
      </radialGradient>
      <radialGradient id="moonGrad" cx="40%" cy="35%" r="60%">
        <stop offset="0%" stop-color="#fff9d6"/>
        <stop offset="60%" stop-color="#ffe97a"/>
        <stop offset="100%" stop-color="#f0c840"/>
      </radialGradient>
      <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#ffe97a" stop-opacity="0.25"/>
        <stop offset="100%" stop-color="#ffe97a" stop-opacity="0"/>
      </radialGradient>
    </defs>

    <rect width="700" height="560" fill="url(#skyGrad)"/>

    <!-- Moon glow halo -->
    <ellipse cx="580" cy="90" rx="70" ry="70" fill="url(#glowGrad)" style="animation: moonGlow 4s ease-in-out infinite;"/>

    <!-- Moon -->
    <g style="animation: moonGlow 4s ease-in-out infinite;">
      <circle cx="580" cy="90" r="38" fill="url(#moonGrad)"/>
      <circle cx="598" cy="74" r="38" fill="#0d0b2e"/>
    </g>

    <!-- Stars with twinkle -->
    <circle cx="40" cy="30" r="1.5" fill="white" style="animation: twinkle 2.1s ease-in-out infinite;"/>
    <circle cx="120" cy="18" r="1.2" fill="white" style="animation: twinkle 3s ease-in-out infinite 0.5s;"/>
    <circle cx="200" cy="42" r="1.8" fill="white" style="animation: twinkle 2.5s ease-in-out infinite 1s;"/>
    <circle cx="310" cy="15" r="1.3" fill="white" style="animation: twinkle 1.8s ease-in-out infinite 0.3s;"/>
    <circle cx="390" cy="35" r="1" fill="#e0d0ff" style="animation: twinkle 2.8s ease-in-out infinite 0.8s;"/>
    <circle cx="460" cy="20" r="1.5" fill="white" style="animation: twinkle 3.2s ease-in-out infinite 0.2s;"/>
    <circle cx="510" cy="55" r="1" fill="#d0e8ff" style="animation: twinkle 2.3s ease-in-out infinite 1.2s;"/>
    <circle cx="640" cy="40" r="1.4" fill="white" style="animation: twinkle 1.9s ease-in-out infinite 0.6s;"/>
    <circle cx="670" cy="15" r="1" fill="white" style="animation: twinkle 2.6s ease-in-out infinite 0.9s;"/>
    <circle cx="70" cy="80" r="1.2" fill="#ffe0ff" style="animation: twinkle 3.4s ease-in-out infinite 0.4s;"/>
    <circle cx="155" cy="70" r="1" fill="white" style="animation: twinkle 2.2s ease-in-out infinite 1.5s;"/>
    <circle cx="260" cy="60" r="1.6" fill="white" style="animation: twinkle 2.7s ease-in-out infinite 0.7s;"/>
    <circle cx="350" cy="80" r="1.1" fill="#e0d0ff" style="animation: twinkle 3.1s ease-in-out infinite 1.1s;"/>
    <circle cx="430" cy="68" r="1.4" fill="white" style="animation: twinkle 1.7s ease-in-out infinite 0.3s;"/>
    <circle cx="30" cy="140" r="1" fill="white" style="animation: twinkle 2.9s ease-in-out infinite 0.5s;"/>
    <circle cx="100" cy="125" r="1.3" fill="#d0e8ff" style="animation: twinkle 2.4s ease-in-out infinite 1.3s;"/>
    <circle cx="220" cy="110" r="1.1" fill="white" style="animation: twinkle 3.3s ease-in-out infinite 0.8s;"/>
    <circle cx="480" cy="110" r="1.5" fill="white" style="animation: twinkle 2s ease-in-out infinite 0.2s;"/>
    <circle cx="660" cy="110" r="1.2" fill="#ffe0ff" style="animation: twinkle 2.8s ease-in-out infinite 1s;"/>

    <!-- Shooting star -->
    <line x1="80" y1="50" x2="140" y2="80" stroke="white" stroke-width="0.8" stroke-opacity="0.5" style="animation: twinkle2 4s ease-in-out infinite 2s;"/>

    <!-- Subtle horizon mist -->
    <rect x="0" y="420" width="700" height="140" fill="#1a0a2e" opacity="0.5"/>
    <ellipse cx="350" cy="480" rx="320" ry="60" fill="#120820" opacity="0.4"/>
  </svg>

  <!-- Floating petals -->
  <span class="petal" style="left:5%; animation-duration:8s; animation-delay:0s;">✦</span>
  <span class="petal" style="left:18%; animation-duration:10s; animation-delay:1.5s; font-size:12px; color:#c9a0ff;">✧</span>
  <span class="petal" style="left:75%; animation-duration:9s; animation-delay:0.6s; color:#ffe0ff;">✦</span>
  <span class="petal" style="left:88%; animation-duration:11s; animation-delay:2s; font-size:11px; color:#a0d0ff;">✧</span>

  <div class="card">
    <span class="heart-icon">🌙</span>
    <p class="card-title">Para ti</p>
    <div class="divider">Aby</div>
    <p class="card-msg">
      A veces la vida trae personas inesperadas<br>
      que sin darse cuenta, se vuelven parte<br>
      de tus días favoritos.<br><br>
      Gracias por aparecer,<br>
      por tus mensajes, tu compañía,<br>
      y por hacerme <em>sonreír</em> sin proponértelo.
    </p>
    <div class="stars-row">
      <span class="star">✦</span>
      <span class="star">✦</span>
      <span class="star">✦</span>
      <span class="star">✦</span>
      <span class="star">✦</span>
    </div>
    <p class="footer-note">con cariño, desde acá ✉︎</p>
    <button class="send-btn" onclick="sendPrompt('Quiero personalizar el mensaje de la tarjeta')">↗</button>
  </div>
</div>
